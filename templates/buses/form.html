{% extends "base.html" %}
{% block title %}{{ 'Edit' if action == 'edit' else 'Add' }} Bus - Smart Bus{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 fw-bold mb-0">
        <i class="bi bi-bus-front text-info"></i>
        {{ 'Edit Bus' if action == 'edit' else 'Add New Bus' }}
    </h1>
    <a href="/buses" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back to List
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form method="POST"
                      action="{{ '/buses/' + bus.id|string + '/edit' if action == 'edit' else '/buses/add' }}">

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Bus Number <span class="text-danger">*</span></label>
                            <input type="text" name="bus_number" class="form-control"
                                   value="{{ bus.bus_number if bus else '' }}"
                                   placeholder="e.g. BUS-01" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">License Plate</label>
                            <input type="text" name="license_plate" class="form-control"
                                   value="{{ bus.license_plate if bus else '' }}"
                                   placeholder="e.g. MP09AB1234">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-medium">Route Name</label>
                        <input type="text" name="route_name" class="form-control"
                               value="{{ bus.route_name if bus else '' }}"
                               placeholder="e.g. Route A - City Centre">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-medium">RFID UID
                            <small class="text-muted">(for IoT gate scanner)</small>
                        </label>
                        <input type="text" name="rfid_uid" class="form-control font-monospace"
                               value="{{ bus.rfid_uid if bus else '' }}"
                               placeholder="e.g. AB12CD34">
                        <div class="form-text">Scan the RFID tag with the ESP32 reader to find the UID.</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-medium">Assign Driver</label>
                        <select name="driver_name" class="form-select">
                            <option value="">-- No Driver Assigned --</option>
                            {% for driver in drivers %}
                            <option value="{{ driver.driver_name }}"
                                {{ 'selected' if bus and bus.driver_name == driver.driver_name }}>
                                {{ driver.driver_name }}
                                {% if driver.license_number %} ({{ driver.license_number }}){% endif %}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-info text-white">
                            <i class="bi bi-check-circle"></i>
                            {{ 'Update Bus' if action == 'edit' else 'Add Bus' }}
                        </button>
                        <a href="/buses" class="btn btn-light">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
